name: Dependabot

version: 2

updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/.github/workflows"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"

  - package-ecosystem: "npm"
    # Este repo no tiene package.json, pero por si agregamos dependencias
    # JS para la landing page en el futuro
    directory: "/web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Solo actuar si existe /web/package.json
